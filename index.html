<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圣多纳深度释放工坊</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            --accent-color: #76d7c4;
            --text-main: #ecf0f1;
            --text-dim: #bdc3c7;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'STHeiti', 'Microsoft YaHei', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
            backdrop-filter: blur(10px);
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .progress-bar {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin: 0 auto 2rem;
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-inner {
            width: 10%;
            height: 100%;
            background: var(--accent-color);
            transition: width 0.5s ease;
        }

        h2 {
            font-weight: 300;
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 12px;
            color: white;
            width: 80%;
            font-size: 1.1rem;
            outline: none;
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 20px rgba(118, 215, 196, 0.4);
        }

        button.secondary {
            border-color: var(--text-dim);
            color: var(--text-dim);
        }

        .fade-in { animation: fadeIn 1s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hint {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="progress-bar"><div id="progress-inner"></div></div>
    <div id="content" class="fade-in">
        <h2 id="display-text">准备好开始一段内在释放之旅了吗？</h2>
        <div id="interactive-area">
            <button onclick="startJourney()">是的，开始</button>
        </div>
        <p class="hint" id="hint-text">请找一个安静的地方坐好</p>
    </div>
</div>

<script>
    let state = {
        step: 0,
        feeling: "",
        want: ""
    };

    const content = document.getElementById('content');
    const displayText = document.getElementById('display-text');
    const interactiveArea = document.getElementById('interactive-area');
    const hintText = document.getElementById('hint-text');
    const progressInner = document.getElementById('progress-inner');

    function updateUI(text, hint, buttons, progress) {
        content.classList.remove('fade-in');
        void content.offsetWidth; 
        content.classList.add('fade-in');

        displayText.innerHTML = text;
        hintText.innerText = hint;
        progressInner.style.width = progress + "%";
        
        interactiveArea.innerHTML = '';
        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.innerText = btn.label;
            if(btn.class) b.className = btn.class;
            b.onclick = btn.action;
            interactiveArea.appendChild(b);
        });
    }

    function startJourney() {
        updateUI(
            "此时此刻，你的内心正浮现出什么感觉？",
            "试着去描述它，而不是解释它",
            [{ label: "确认", action: () => setFeeling() }],
            20
        );
        interactiveArea.insertAdjacentHTML('afterbegin', `<input type="text" id="feeling-input" class="input-box" placeholder="例如：胸口闷、烦躁、委屈...">`);
    }

    function setFeeling() {
        state.feeling = document.getElementById('feeling-input').value || "这种感觉";
        askToAllow();
    }

    function askToAllow() {
        updateUI(
            `你能允许 **${state.feeling}** 在这一刻存在吗？`,
            "接纳是释放的第一步",
            [
                { label: "可以", action: askDesire },
                { label: "有点抗拒", action: () => releaseResistance() }
            ],
            35
        );
    }

    function releaseResistance() {
        updateUI(
            "你能允许这种“抗拒”的感觉存在吗？",
            "即便是抗拒，也是可以被接纳的",
            [{ label: "可以了，继续", action: askDesire }],
            40
        );
    }

    function askDesire() {
        updateUI(
            `感受一下，**${state.feeling}** 背后是否藏着某种渴望？`,
            "大多数情绪都源于这三种基本欲望",
            [
                { label: "想要控制什么", action: () => setWant("控制欲") },
                { label: "想要获得认可", action: () => setWant("认可欲") },
                { label: "想要安全感", action: () => setWant("安全欲") },
                { label: "不确定，就是不舒服", action: () => setWant("这种牵挂") }
            ],
            55
        );
    }

    function setWant(want) {
        state.want = want;
        askCould();
    }

    function askCould() {
        updateUI(
            `你能把想要这份 **${state.want}** 的冲动放下吗？`,
            "Could you? 这只是在询问你的能力，不代表必须做",
            [
                { label: "可以", action: askWould },
                { label: "很难", action: askWould }
            ],
            70
        );
    }

    function askWould() {
        updateUI(
            `你愿意放下它，换取一份轻松吗？`,
            "Would you? 这是你的意愿选择",
            [
                { label: "我愿意", action: askWhen },
                { label: "还是不想", action: askWhen }
            ],
            85
        );
    }

    function askWhen() {
        updateUI(
            `什么时候？`,
            "当下是唯一的出口",
            [{ label: "现在", action: finalize }],
            95
        );
    }

    function finalize() {
        updateUI(
            "深吸一口气...再缓缓呼出。<br>现在感觉如何？",
            "释放是一个剥洋葱的过程",
            [
                { label: "轻松多了", action: () => location.reload() },
                { label: "还有剩余的感觉", action: () => startJourney() }
            ],
            100
        );
    }
</script>

</body>
</html>
